version: '3.8'

services:
  bahasakita-app:
    build:
      context: ../
      dockerfile: docker/Dockerfile 
    container_name: bahasakita-app
    restart: unless-stopped
    env_file:
      - ../.env
    tty: true
    environment:
      SERVICE_NAME: bahasakita-app
    volumes:
      - ../:/var/www/html
      - ./nginx.conf:/etc/nginx/http.d/default.conf
      - ./supervisord.conf:/etc/supervisord.conf
    ports:
      - "8001:80"
    networks:
      - bahasakita-network
    depends_on:
      - bahasakita-db

  bahasakita-db:
    image: mysql:8.0
    container_name: bahasakita-db
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - bahasakita-dbdata:/var/lib/mysql
    ports:
      - "33061:3306"
    networks:
      - bahasakita-network

networks:
  bahasakita-network:
    driver: bridge

volumes:
  bahasakita-dbdata:
    driver: local